name: eDiscovery & Privacy Daily Intelligence Digest

on:
  schedule:
    # Email report: 6 AM EST = 11:00 UTC
    - cron: '0 11 * * 1-5'
    # Chat card: 8 AM EST = 13:00 UTC
    - cron: '0 13 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Output mode'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - chat
          - email
      dry_run:
        description: 'Dry run (no sends)'
        type: boolean
        default: false

jobs:
  daily-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ROCKETLANE_API_KEY: ${{ secrets.ROCKETLANE_API_KEY }}
      GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      GCHAT_WEBHOOK_URL: ${{ secrets.GCHAT_WEBHOOK_URL }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Restore snapshot from prior run
      - name: Restore snapshot cache
        uses: actions/cache@v4
        with:
          path: .snapshots
          key: digest-snapshot-${{ github.run_number }}
          restore-keys: |
            digest-snapshot-

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 11 * * 1-5" ]; then
            echo "mode=email" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 13 * * 1-5" ]; then
            echo "mode=chat" >> $GITHUB_OUTPUT
          else
            echo "mode=both" >> $GITHUB_OUTPUT
          fi

      - name: Run Daily Digest
        run: |
          ARGS="--mode ${{ steps.mode.outputs.mode }}"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python daily_digest.py $ARGS
