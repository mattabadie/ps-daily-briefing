name: PS Operations Daily Intelligence Digest

on:
  schedule:
    # Weekdays at 7:30 AM EST (12:30 UTC) — after daily-briefing runs at 7AM
    - cron: '30 12 * * 1-5'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no email sent)'
        type: boolean
        default: false
      force_weekly:
        description: 'Force weekly narrative section'
        type: boolean
        default: false

jobs:
  daily-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ROCKETLANE_API_KEY: ${{ secrets.ROCKETLANE_API_KEY }}
      GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Restore snapshot from prior run
      - name: Restore snapshot cache
        uses: actions/cache@v4
        with:
          path: .snapshots
          key: digest-snapshot-${{ github.run_number }}
          restore-keys: |
            digest-snapshot-

      - name: Run Daily Digest
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ "${{ github.event.inputs.force_weekly }}" = "true" ]; then
            ARGS="$ARGS --force-weekly"
          fi
          python daily_digest.py $ARGS
