name: PS Daily Briefing

on:
  # Weekdays at 8:00 AM EST (13:00 UTC)
  # Note: GitHub Actions cron uses UTC. EST = UTC-5.
  schedule:
    - cron: '0 13 * * 1-5'

  # Allow manual trigger from Actions tab
  workflow_dispatch:

jobs:
  post-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run daily briefing
        env:
          ROCKETLANE_API_KEY: ${{ secrets.ROCKETLANE_API_KEY }}
          GCHAT_WEBHOOK_URL: ${{ secrets.GCHAT_WEBHOOK_URL }}
        run: python daily_briefing_chat.py
